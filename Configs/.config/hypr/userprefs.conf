$dropterm  = ^(kitty-dropterm)$
$ranger  = ^(kitty-ranger)$
$spotify  = ^(Spotify)$
windowrulev2 = opacity 0.80 0.80,class:^(kitty-dropterm)$
windowrulev2 = opacity 0.80 0.80,class:^(kitty-ranger)$
windowrulev2 = opacity 0.80 0.80,class:^(Beeper)$


windowrule = workspace 1, firefox
windowrule = workspace 2, kitty
windowrule = workspace 3, code
#windowrule = workspace 5, Spotify
windowrule = workspace 6, discord
windowrule = workspace 6, Beeper
windowrule = workspace 7, dolphin


windowrule = float,$dropterm
windowrulev2 = pin,class:^(kitty-dropterm)$
windowrule = workspace special:scratch_term silent,$dropterm
windowrule = size 65% 60%,$dropterm
windowrule = move 12% -200%,$dropterm


windowrule = float,$ranger
windowrulev2 = pin,class:^(kitty-ranger)$
windowrule = workspace special:scratch_ranger silent,$ranger
windowrule = size 65% 55%,$ranger
windowrule = move 12% -200%,$ranger


windowrule = float,$spotify
